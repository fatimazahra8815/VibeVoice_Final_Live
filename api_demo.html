<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeVoice API Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            background-attachment: fixed;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.1"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.1"/><circle cx="50" cy="10" r="0.5" fill="white" opacity="0.05"/><circle cx="10" cy="50" r="0.5" fill="white" opacity="0.05"/><circle cx="90" cy="30" r="0.5" fill="white" opacity="0.05"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.2rem;
            font-weight: 300;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .header h1 .emoji {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 35px;
            padding: 30px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(248, 250, 252, 0.8) 0%, rgba(241, 245, 249, 0.8) 100%);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }

        .section:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .section h2 {
            color: #1a202c;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(226, 232, 240, 0.8);
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: 500;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: linear-gradient(135deg, #a0aec0 0%, #718096 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn.secondary {
            background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
            box-shadow: 0 4px 15px rgba(113, 128, 150, 0.3);
        }

        .btn.secondary:hover {
            box-shadow: 0 8px 25px rgba(113, 128, 150, 0.4);
        }

        .status {
            margin-top: 20px;
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .status.success {
            background: linear-gradient(135deg, rgba(198, 246, 213, 0.9) 0%, rgba(154, 230, 180, 0.9) 100%);
            color: #22543d;
            border-color: rgba(154, 230, 180, 0.5);
        }

        .status.error {
            background: linear-gradient(135deg, rgba(254, 215, 215, 0.9) 0%, rgba(254, 178, 178, 0.9) 100%);
            color: #742a2a;
            border-color: rgba(254, 178, 178, 0.5);
        }

        .status.info {
            background: linear-gradient(135deg, rgba(190, 227, 248, 0.9) 0%, rgba(144, 205, 244, 0.9) 100%);
            color: #2a4365;
            border-color: rgba(144, 205, 244, 0.5);
        }

        .audio-player {
            margin-top: 15px;
            width: 100%;
        }

        .voices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .voice-card {
            padding: 20px 15px;
            border: 2px solid rgba(226, 232, 240, 0.8);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .voice-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .voice-card:hover {
            border-color: #667eea;
            background: rgba(235, 244, 255, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .voice-card:hover::before {
            transform: scaleX(1);
        }

        .voice-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(235, 244, 255, 0.9) 0%, rgba(226, 239, 255, 0.9) 100%);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .voice-card.selected::before {
            transform: scaleX(1);
        }

        .voice-name {
            font-weight: 700;
            color: #1a202c;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .voice-type {
            font-size: 0.85rem;
            color: #718096;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .loading {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(243, 243, 243, 0.8);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .audio-player {
            margin-top: 20px;
            width: 100%;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
        }

        .hidden {
            display: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                max-width: 100%;
                margin: 0;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 2.5rem;
            }

            .content {
                padding: 20px;
            }

            .section {
                padding: 20px;
                margin-bottom: 25px;
            }

            .voices-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 10px;
            }

            .voice-card {
                padding: 15px 10px;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5a67d8, #6b46c1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="emoji">🎵</span> VibeVoice API Demo</h1>
            <p>OpenAI-compatible Text-to-Speech API</p>
        </div>

        <div class="content">
            <!-- Voices Section -->
            <div class="section">
                <h2>🎤 Available Voices</h2>
                <div id="voices-container">
                    <div class="status info">Loading voices...</div>
                </div>
            </div>

            <!-- Text Input Section -->
            <div class="section">
                <h2>📝 Text to Speech</h2>
                <div class="form-group">
                    <label for="text-input">Text to synthesize:</label>
                    <textarea id="text-input" placeholder="Enter text to convert to speech...">Hello! This is a demonstration of the VibeVoice API. It can generate natural-sounding speech from text.</textarea>
                </div>

                <div class="form-group">
                    <label for="voice-select">Voice:</label>
                    <select id="voice-select">
                        <option value="">Select a voice...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="model-select">Model:</label>
                    <select id="model-select">
                        <option value="tts-1">tts-1 (Standard)</option>
                        <option value="tts-1-hd">tts-1-hd (High Quality)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="format-select">Audio Format:</label>
                    <select id="format-select">
                        <option value="wav">WAV</option>
                        <option value="pcm">PCM</option>
                    </select>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="stream-checkbox" checked>
                        <label for="stream-checkbox">Enable streaming</label>
                    </div>
                </div>

                <button id="generate-btn" class="btn">
                    <span id="generate-icon">🎵</span>
                    Generate Speech
                </button>

                <div id="status-message"></div>
            </div>

            <!-- Audio Player Section -->
            <div class="section hidden" id="audio-section">
                <h2>🎧 Generated Audio</h2>
                <audio id="audio-player" controls class="audio-player"></audio>
                <br>
                <button id="download-btn" class="btn secondary">
                    📥 Download Audio
                </button>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'http://localhost:7860';

        // DOM Elements
        const voicesContainer = document.getElementById('voices-container');
        const voiceSelect = document.getElementById('voice-select');
        const textInput = document.getElementById('text-input');
        const generateBtn = document.getElementById('generate-btn');
        const generateIcon = document.getElementById('generate-icon');
        const statusMessage = document.getElementById('status-message');
        const audioSection = document.getElementById('audio-section');
        const audioPlayer = document.getElementById('audio-player');
        const downloadBtn = document.getElementById('download-btn');
        const streamCheckbox = document.getElementById('stream-checkbox');

        let audioContext = null;
        let audioQueue = [];
        let isPlaying = false;
        let nextStartTime = 0;

        // Initialize the app
        async function init() {
            try {
                await loadVoices();
                await loadModels();
            } catch (error) {
                showStatus('Failed to load API data. Make sure the server is running.', 'error');
                console.error('Init error:', error);
            }
        }

        // Load available voices
        async function loadVoices() {
            try {
                const response = await fetch(`${API_BASE}/v1/audio/voices`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                availableVoices = data.voices || [];

                // Update voice selector
                voiceSelect.innerHTML = '<option value="">Select a voice...</option>';
                availableVoices.forEach(voice => {
                    const option = document.createElement('option');
                    option.value = voice.voice_id;
                    option.textContent = `${voice.name} (${voice.type})`;
                    voiceSelect.appendChild(option);
                });

                // Update voices grid
                voicesContainer.innerHTML = '';
                const voicesGrid = document.createElement('div');
                voicesGrid.className = 'voices-grid';

                availableVoices.forEach(voice => {
                    const card = document.createElement('div');
                    card.className = 'voice-card';
                    card.onclick = () => selectVoice(voice.voice_id);

                    card.innerHTML = `
                        <div class="voice-name">${voice.name}</div>
                        <div class="voice-type">${voice.type}</div>
                    `;

                    voicesGrid.appendChild(card);
                });

                voicesContainer.appendChild(voicesGrid);

            } catch (error) {
                voicesContainer.innerHTML = `<div class="status error">Failed to load voices: ${error.message}</div>`;
                throw error;
            }
        }

        // Load available models
        async function loadModels() {
            try {
                const response = await fetch(`${API_BASE}/v1/audio/models`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                // Models are already populated in HTML
                console.log('Available models:', data.data);

            } catch (error) {
                console.warn('Failed to load models:', error);
            }
        }

        // Select voice from grid
        function selectVoice(voiceId) {
            voiceSelect.value = voiceId;

            // Update visual selection
            document.querySelectorAll('.voice-card').forEach(card => {
                card.classList.remove('selected');
            });

            const selectedCard = Array.from(document.querySelectorAll('.voice-card')).find(card => {
                const voice = availableVoices.find(v => v.voice_id === voiceId);
                return voice && card.textContent.includes(voice.name);
            });

            if (selectedCard) {
                selectedCard.classList.add('selected');
            }
        }

        // Generate speech
        async function generateSpeech() {
            const text = textInput.value.trim();
            const voice = voiceSelect.value;
            const model = document.getElementById('model-select').value;
            const format = document.getElementById('format-select').value;
            const stream = streamCheckbox.checked;

            if (!text) {
                showStatus('Please enter some text to synthesize.', 'error');
                return;
            }

            if (!voice) {
                showStatus('Please select a voice.', 'error');
                return;
            }

            // Update UI
            generateBtn.disabled = true;
            generateIcon.innerHTML = '<div class="loading"></div>';
            generateBtn.textContent = 'Generating...';
            showStatus('Generating speech...', 'info');

            try {
                const payload = {
                    input: text,
                    voice: voice,
                    model: model,
                    response_format: format,
                    stream: stream
                };

                const response = await fetch(`${API_BASE}/v1/audio/speech`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(`HTTP ${response.status}: ${error}`);
                }

                if (stream) {
                    // Handle streaming response (real-time playback)
                    await handleStreamingResponse(response, 'pcm');
                } else {
                    // Handle regular response
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);

                    // Clean up previous audio
                    if (currentAudioUrl) {
                        URL.revokeObjectURL(currentAudioUrl);
                    }
                    currentAudioUrl = audioUrl;

                    // Update audio player
                    audioPlayer.src = audioUrl;
                    audioSection.classList.remove('hidden');

                    // Setup download
                    downloadBtn.onclick = () => {
                        const link = document.createElement('a');
                        link.href = audioUrl;
                        link.download = `vibevoice_${voice}_${Date.now()}.${format}`;
                        link.click();
                    };

                    showStatus('Speech generated successfully!', 'success');
                }

            } catch (error) {
                showStatus(`Generation failed: ${error.message}`, 'error');
                console.error('Generation error:', error);
            } finally {
                generateBtn.disabled = false;
                generateIcon.textContent = '🎵';
                generateBtn.innerHTML = '<span id="generate-icon">🎵</span> Generate Speech';
            }
        }

        // Convert raw PCM16 data to WAV format
        function createWavFromPcm(pcmData, sampleRate, numChannels) {
            const dataLength = pcmData.length;
            const buffer = new ArrayBuffer(44 + dataLength);
            const view = new DataView(buffer);

            // WAV header
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true); // File size - 8
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true); // Format chunk size
            view.setUint16(20, 1, true); // Audio format (PCM)
            view.setUint16(22, numChannels, true); // Number of channels
            view.setUint32(24, sampleRate, true); // Sample rate
            view.setUint32(28, sampleRate * numChannels * 2, true); // Byte rate
            view.setUint16(32, numChannels * 2, true); // Block align
            view.setUint16(34, 16, true); // Bits per sample
            writeString(36, 'data');
            view.setUint32(40, dataLength, true); // Data size

            // Copy PCM data
            for (let i = 0; i < dataLength; i++) {
                view.setUint8(44 + i, pcmData[i]);
            }

            return new Uint8Array(buffer);
        }
        async function handleStreamingResponse(response, format) {
            // Initialize audio context for real-time playback
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            const reader = response.body.getReader();
            audioQueue = [];
            isPlaying = true;
            nextStartTime = audioContext.currentTime + 0.1; // Small buffer

            showStatus('Receiving streaming audio...', 'info');

            try {
                let totalReceived = 0;
                let chunksProcessed = 0;

                while (true) {
                    const { done, value } = await reader.read();

                    if (done) break;

                    totalReceived += value.length;

                    // Convert PCM bytes to audio buffer and play immediately
                    await playAudioChunk(value);

                    chunksProcessed++;
                    showStatus(`Streaming... ${totalReceived} bytes (${chunksProcessed} chunks)`, 'info');
                }

                // Wait a bit for the last chunks to finish playing
                setTimeout(() => {
                    isPlaying = false;
                    showStatus(`Streaming complete! Received ${totalReceived} bytes`, 'success');

                    // Create downloadable version from queued audio
                    createDownloadableAudio();
                }, 1000);

            } catch (error) {
                showStatus(`Streaming failed: ${error.message}`, 'error');
                isPlaying = false;
                throw error;
            }
        }

        // Play audio chunk in real-time
        async function playAudioChunk(pcmData) {
            // Convert PCM16 bytes to Float32
            const pcm16 = new Int16Array(pcmData.buffer, pcmData.byteOffset, pcmData.length / 2);
            const float32 = new Float32Array(pcm16.length);

            for (let i = 0; i < pcm16.length; i++) {
                float32[i] = pcm16[i] / 32768.0;
            }

            // Create audio buffer
            const buffer = audioContext.createBuffer(1, float32.length, 24000);
            buffer.getChannelData(0).set(float32);

            // Create and schedule audio source
            const source = audioContext.createBufferSource();
            source.buffer = buffer;

            // Store for potential download
            audioQueue.push(buffer);

            // Connect and play
            source.connect(audioContext.destination);
            source.start(nextStartTime);

            // Update next start time
            nextStartTime += buffer.duration;
        }

        // Create downloadable audio from queued buffers
        function createDownloadableAudio() {
            if (audioQueue.length === 0) return;

            // Combine all audio buffers
            const totalSamples = audioQueue.reduce((sum, buffer) => sum + buffer.length, 0);
            const combinedBuffer = audioContext.createBuffer(1, totalSamples, 24000);
            const channelData = combinedBuffer.getChannelData(0);

            let offset = 0;
            for (const buffer of audioQueue) {
                channelData.set(buffer.getChannelData(0), offset);
                offset += buffer.length;
            }

            // Convert to WAV
            const wavData = bufferToWav(combinedBuffer);
            const audioBlob = new Blob([wavData], { type: 'audio/wav' });
            const audioUrl = URL.createObjectURL(audioBlob);

            // Clean up previous audio
            if (currentAudioUrl) {
                URL.revokeObjectURL(currentAudioUrl);
            }
            currentAudioUrl = audioUrl;

            // Update audio player
            audioPlayer.src = audioUrl;
            audioSection.classList.remove('hidden');

            // Setup download
            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.href = audioUrl;
                link.download = `vibevoice_stream_${Date.now()}.wav`;
                link.click();
            };
        }

        // Convert AudioBuffer to WAV format
        function bufferToWav(buffer) {
            const length = buffer.length;
            const sampleRate = buffer.sampleRate;
            const numChannels = buffer.numberOfChannels;
            const bytesPerSample = 2; // 16-bit
            const blockAlign = numChannels * bytesPerSample;
            const byteRate = sampleRate * blockAlign;
            const dataSize = length * blockAlign;
            const bufferSize = 44 + dataSize;

            const arrayBuffer = new ArrayBuffer(bufferSize);
            const view = new DataView(arrayBuffer);

            // WAV header
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, bufferSize - 8, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);

            // Convert float to 16-bit PCM
            let offset = 44;
            for (let i = 0; i < length; i++) {
                for (let channel = 0; channel < numChannels; channel++) {
                    const sample = Math.max(-1, Math.min(1, buffer.getChannelData(channel)[i]));
                    view.setInt16(offset, sample * 32767, true);
                    offset += 2;
                }
            }

            return new Uint8Array(arrayBuffer);
        }

        // Show status message
        function showStatus(message, type) {
            statusMessage.className = `status ${type}`;
            statusMessage.textContent = message;
        }

        // Event listeners
        generateBtn.addEventListener('click', generateSpeech);

        // Initialize on page load
        init();
    </script>
</body>
</html>
